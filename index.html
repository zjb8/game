<!DOCTYPE html><html><head><meta charset="UTF-8"><title>🍎收集者</title><style>body{background:#1a3b2e;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;}canvas{border:4px solid #b56f3c;background:#4f7b5e;box-shadow:0 0 20px #2b4d3a;}</style></head><body><canvas id='c'width='300'height='300'></canvas><script>let C=document.getElementById('c').getContext('2d');let p={x:140,y:260},e={x:60,y:60},s=5,score=0;document.onkeydown=k=>{let key=k.key;if(key=='ArrowLeft')p.x-=s;if(key=='ArrowRight')p.x+=s;if(key=='ArrowUp')p.y-=s;if(key=='ArrowDown')p.y+=s;p.x=Math.max(0,Math.min(280,p.x));p.y=Math.max(0,Math.min(280,p.y));};setInterval(()=>{let dx=e.x-p.x,dy=e.y-p.y,dist=Math.hypot(dx,dy);if(dist<20){score++;e.x=20+Math.random()*260;e.y=20+Math.random()*260;}C.fillStyle='#4f7b5e';C.fillRect(0,0,300,300);C.fillStyle='#ffd966';C.beginPath();C.arc(p.x+15,p.y+15,15,0,7);C.fill();C.fillStyle='#e63946';C.beginPath();C.arc(e.x+15,e.y+15,15,0,7);C.fill();C.fillStyle='white';C.font='bold 18px monospace';C.fillText('🍎'+score,10,30);},30);</script></body></html>
